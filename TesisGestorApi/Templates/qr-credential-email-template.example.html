<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Template Credencial QR</title>
  </head>
  <body style="margin:0;padding:0;background:#f6f8fb;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:20px 10px;">
      <tr>
        <td align="center">
          <table width="620" cellpadding="0" cellspacing="0" style="max-width:620px;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="background:#0f4c81;color:#ffffff;padding:18px 22px;font-size:20px;font-weight:700;">
                Credencial QR Escolar
              </td>
            </tr>
            <tr>
              <td style="padding:22px;">
                <p style="margin:0 0 12px 0;">Hola <strong>{{TUTOR_NOMBRE}}</strong>,</p>
                <p style="margin:0 0 12px 0;line-height:1.5;">{{MENSAJE_PRINCIPAL}}</p>
                <p style="margin:0 0 18px 0;line-height:1.5;">
                  Alumno/a: <strong>{{ALUMNO_NOMBRE}}</strong><br />
                  Año lectivo: <strong>{{ANIO_LECTIVO}}</strong>
                </p>

                <div style="text-align:center;padding:10px 0 18px 0;">
                  <!-- Placeholder inline image -->
                  <img
                    src="cid:{{QR_CONTENT_ID}}"
                    alt="QR credencial"
                    style="width:220px;height:220px;border:1px solid #d1d5db;border-radius:8px;padding:8px;background:#fff;" />
                </div>

                <p style="margin:0 0 10px 0;font-size:13px;color:#4b5563;">
                  Código de respaldo: <strong>{{CODIGO_QR}}</strong>
                </p>
                <p style="margin:0;font-size:12px;color:#6b7280;">
                  Este email fue enviado automáticamente por Tesis Gestor.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
